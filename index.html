<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TJD | Buscar negocios</title>
  <link rel="stylesheet" href="style.css" />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />
</head>

<body>
  <div class="app">

    <!-- HEADER -->
    <header class="hero">
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <div class="brand-row">
          <div class="brand-logo">TJD</div>
          <div class="brand-copy">
            <h1>Buscar negocios, servicios<br />y categorías</h1>
          </div>
        </div>

        <div class="search-panel">
          <div class="top-search-row">
            <div class="search-box">
              <input
                type="text"
                id="searchInput"
                placeholder="Buscar negocios, servicios o categorías..."
              />
              <button id="searchBtn" class="search-btn" type="button">
                <i class="fa-solid fa-magnifying-glass"></i>
              </button>
            </div>

            <button class="cta-yellow" id="btnKmTop" type="button">
              <i class="fa-solid fa-location-dot"></i>
              Buscar por km
            </button>

            <button class="mini-icon" id="btnAvisoTop" type="button">
              <i class="fa-solid fa-user-shield"></i>
            </button>

            <button class="mini-icon" id="btnPoliticasTop" type="button">
              <i class="fa-solid fa-file-contract"></i>
            </button>
          </div>

          <div class="quick-actions">
            <button class="action-btn action-purple" id="btnKmBottom">
              <i class="fa-solid fa-location-dot"></i>
              Buscar por km
            </button>

            <button class="action-btn action-pink" id="btnSubirTarjeta">
              <i class="fa-solid fa-circle-play"></i>
              Sube tu tarjeta
            </button>

            <button class="action-btn action-dark" id="btnDescargarApp">
              <i class="fa-brands fa-google-play"></i>
              Descargar app
            </button>

            <button class="action-btn action-dark" id="btnAppStore">
              <i class="fa-brands fa-apple"></i>
              App Store
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- CATEGORIAS -->
    <section class="categories-section">
      <div class="categories-row">
        <button class="chip chip-green active" data-category="todos">Todos</button>
        <button class="chip chip-blue" data-category="medicos">Médicos</button>
        <button class="chip chip-cyan" data-category="seguros">Seguros</button>
        <button class="chip chip-violet" data-category="talleres">Talleres</button>
        <button class="chip chip-purple" data-category="panaderias">Panaderías</button>
        <button class="chip chip-pink" data-category="restaurantes">Restaurantes</button>
        <button class="chip chip-light" id="btnMas">Más</button>
      </div>
    </section>

    <!-- CONTENIDO -->
    <main class="main-content">

      <section class="section-title-wrap">
        <h2>Negocios destacados</h2>
      </section>

      <section class="cards-container" id="cardsContainer"></section>

      <!-- BOTONES FOOTER TARJETAS -->
      <div class="footer-chips">

        <button class="footer-chip js-calificar">
          ⭐ Calificar
        </button>

        <button class="footer-chip js-comentar">
          💬 Comentar
        </button>

        <button class="footer-chip js-opinar">
          📝 Opinar
        </button>

      </div>

    </main>


    <!-- FOOTER LEGAL -->
    <footer class="legal-footer">
      <div class="legal-footer-inner">
        <div class="legal-copy">
          <strong>Tarjetero Digital TJD</strong>
          <span>Directorio digital de negocios y servicios.</span>
        </div>

        <div class="legal-links">
          <button class="legal-link-btn" id="btnAvisoFooter">Aviso de Privacidad</button>
          <button class="legal-link-btn" id="btnPoliticasFooter">Políticas de Uso</button>
          <button class="legal-link-btn" id="btnDeslindeFooter">Deslinde</button>
        </div>
      </div>
    </footer>

  </div>

<script type="module" src="script.js"></script>

</body>
</html>
